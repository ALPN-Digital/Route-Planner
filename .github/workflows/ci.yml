name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (standard library only)
        working-directory: route-planner
        run: python -m unittest discover -s tests -v
      - name: Smoke-test the CLI
        working-directory: route-planner
        run: |
          python scripts/optimize_route.py examples/stops.example.json --start Warehouse --round-trip
          python scripts/optimize_route.py examples/stops.example.json --json-out > /dev/null
